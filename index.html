<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <title>AR Experience</title>
  <link rel="manifest" href="manifest.json">
  
  <!-- РАБОЧИЕ CDN -->
  <script src="https://unpkg.com/aframe@1.5.0/dist/aframe.min.js"></script>
  <script src="https://unpkg.com/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
  
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #000; font-family: system-ui; overflow: hidden; color: #fff; }
    #loader, #tapOverlay { position: fixed; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; background: #0a0a12; z-index: 100; }
    #loader.hidden, #tapOverlay.hidden { opacity: 0; pointer-events: none; transition: opacity .4s; }
    .spinner { width: 44px; height: 44px; border: 4px solid #222; border-top-color: #6c5ce7; border-radius: 50%; animation: spin 1s linear infinite; margin-bottom: 16px; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .hud { position: fixed; bottom: 32px; left: 50%; transform: translateX(-50%); padding: 10px 18px; background: rgba(0,0,0,0.75); border-radius: 100px; font-size: 0.85rem; z-index: 50; display: none; align-items: center; gap: 8px; }
    .dot { width: 8px; height: 8px; background: #00d4aa; border-radius: 50%; animation: pulse 1.5s infinite; }
    @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.3; } }
    a-scene { width: 100%; height: 100vh; }
    .btn-start { padding: 14px 32px; background: #6c5ce7; color: white; border: none; border-radius: 12px; font-weight: 600; font-size: 1rem; cursor: pointer; }
    .error-box { max-width: 80%; text-align: center; padding: 20px; }
    .error-box h2 { margin-bottom: 10px; color: #ff6464; }
    .error-box p { color: #aaa; line-height: 1.5; }
  </style>
</head>
<body>

  <div id="loader">
    <div class="spinner"></div>
    <div id="loadText">Загрузка AR...</div>
  </div>

  <div id="tapOverlay" class="hidden">
    <button class="btn-start" id="startBtn">👆 Нажмите, чтобы начать</button>
  </div>

  <a-scene id="scene" mindar-image="imageTargetSrc: #; filterMinCF: 0.0001; filterBeta: 0.001; maxTrack: 9;" vr-mode-ui="enabled: false" loading-screen="enabled: false" hidden>
    <a-assets>
      <video id="arVideo" loop crossorigin playsinline preload="auto" muted></video>
      <audio id="arAudio" loop crossorigin preload="auto"></audio>
    </a-assets>
    <a-camera position="0 0 0"></a-camera>
    <a-entity mindar-image-target="targetIndex: 0" id="target">
      <a-video src="#arVideo" position="0 0 0.01" scale="1 1 1"></a-video>
    </a-entity>  </a-scene>

  <div class="hud" id="hud">
    <span class="dot"></span> <span id="hudText">Сканирование...</span>
  </div>

  <script>
    const urlParams = new URLSearchParams(window.location.search);
    const projectId = urlParams.get('project');
    const loader = document.getElementById('loader');
    const loadText = document.getElementById('loadText');
    const tapOverlay = document.getElementById('tapOverlay');
    const startBtn = document.getElementById('startBtn');
    const hud = document.getElementById('hud');
    const hudText = document.getElementById('hudText');

    let projectData = null;
    let isStarted = false;

    async function init() {
      if (!projectId) {
        loader.innerHTML = `<div class="error-box"><h2>⚠️ Не указан проект</h2><p>Откройте: ?project=ivan-vizitka</p></div>`;
        return;
      }

      try {
        if (typeof AFRAME === 'undefined') throw new Error('A-Frame не загружен. Проверьте интернет.');
        if (typeof MINDAR === 'undefined') throw new Error('MindAR не загружен. Проверьте интернет.');

        const res = await fetch(`data/${projectId}.json`);
        if (!res.ok) throw new Error(`Проект "${projectId}" не найден`);
        projectData = await res.json();

        const scene = document.getElementById('scene');
        scene.setAttribute('mindar-image', `imageTargetSrc: ${projectData.trigger}; filterMinCF: 0.0001; filterBeta: 0.001; maxTrack: ${projectData.smooth || 9};`);
        
        document.getElementById('arVideo').src = projectData.content;
        document.getElementById('arVideo').setAttribute('scale', `${projectData.scale || 1} ${projectData.scale || 1} 1`);

        if (projectData.audioEnabled && projectData.audio) {
          document.getElementById('arAudio').src = projectData.audio;
          document.getElementById('arAudio').volume = projectData.audioVolume || 0.7;
        }

        loader.classList.add('hidden');
        tapOverlay.classList.remove('hidden');

      } catch (err) {
        loader.innerHTML = `<div class="error-box"><h2>❌ Ошибка</h2><p>${err.message}</p><button onclick="location.reload()" style="margin-top:16px;padding:10px 20px;background:#6c5ce7;color:white;border:none;border-radius:8px;cursor:pointer;">🔄 Обновить</button></div>`;
        console.error(err);      }
    }

    startBtn.addEventListener('click', async () => {
      if (isStarted) return;
      isStarted = true;
      tapOverlay.classList.add('hidden');

      const scene = document.getElementById('scene');
      scene.removeAttribute('hidden');
      hud.style.display = 'flex';
      
      await new Promise(r => setTimeout(r, 600));
      scene.play();

      document.getElementById('target').addEventListener('targetFound', () => {
        hudText.textContent = '✨ Триггер найден!';
        hud.style.background = 'rgba(0,212,170,0.8)';
        document.getElementById('arVideo').play().catch(()=>{});
        if (projectData?.audioEnabled) document.getElementById('arAudio').play().catch(()=>{});
      });

      document.getElementById('target').addEventListener('targetLost', () => {
        hudText.textContent = '👁 Наведите снова';
        hud.style.background = 'rgba(255,165,0,0.8)';
        document.getElementById('arVideo').pause();
        if (projectData?.audioEnabled) document.getElementById('arAudio').pause();
      });
    });

    init();
  </script>
</body>
</html>

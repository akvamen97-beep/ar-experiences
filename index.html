<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#0a0a12">
  <title>AR Experience</title>
  <link rel="manifest" href="manifest.json">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>✨</text></svg>">
  
  <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
  
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #000; font-family: system-ui, -apple-system, sans-serif; overflow: hidden; color: #fff; }
    #loader, #tapOverlay { position: fixed; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; background: #0a0a12; z-index: 100; transition: opacity .4s; }
    #loader.hidden, #tapOverlay.hidden { opacity: 0; pointer-events: none; }
    .spinner { width: 44px; height: 44px; border: 4px solid #222; border-top-color: #6c5ce7; border-radius: 50%; animation: spin 1s linear infinite; margin-bottom: 16px; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .hud { position: fixed; bottom: 32px; left: 50%; transform: translateX(-50%); padding: 10px 18px; background: rgba(0,0,0,0.75); backdrop-filter: blur(8px); border-radius: 100px; font-size: 0.85rem; z-index: 50; display: flex; align-items: center; gap: 8px; transition: .3s; }
    .dot { width: 8px; height: 8px; background: #00d4aa; border-radius: 50%; animation: pulse 1.5s infinite; }
    @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.3; } }
    a-scene { width: 100%; height: 100vh; }
    .btn-start { padding: 14px 32px; background: #6c5ce7; color: white; border: none; border-radius: 12px; font-weight: 600; font-size: 1rem; cursor: pointer; box-shadow: 0 4px 20px rgba(108,92,231,0.4); }
    .error-box { max-width: 80%; text-align: center; }
    .error-box h2 { margin-bottom: 10px; }
    .error-box p { color: #aaa; line-height: 1.5; }
  </style>
</head>
<body>

  <!-- Loader -->
  <div id="loader">
    <div class="spinner"></div>
    <div id="loadText">Загрузка AR-движка...</div>
  </div>

  <!-- iOS Audio/Video Tap Overlay -->
  <div id="tapOverlay" class="hidden">
    <button class="btn-start" id="startBtn">👆 Нажмите, чтобы начать</button>
    <p style="margin-top:12px; color:#888; font-size:0.85rem;">Для активации камеры и звука</p>
  </div>

  <!-- AR Scene -->
  <a-scene id="scene" mindar-image="imageTargetSrc: #; filterMinCF: 0.0001; filterBeta: 0.001; maxTrack: 9;" vr-mode-ui="enabled: false" loading-screen="enabled: false" device-orientation-tracking hidden>
    <a-assets>
      <video id="arVideo" loop crossorigin playsinline preload="auto" muted></video>      <audio id="arAudio" loop crossorigin preload="auto"></audio>
    </a-assets>
    <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>
    <a-entity mindar-image-target="targetIndex: 0" id="target">
      <a-video src="#arVideo" position="0 0 0.01" scale="1 1 1"></a-video>
    </a-entity>
  </a-scene>

  <!-- HUD -->
  <div class="hud" id="hud">
    <span class="dot"></span> <span id="hudText">Ожидание...</span>
  </div>

  <script>
    // ===== 1. PWA Регистрация =====
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('sw.js').catch(err => console.log('SW not registered:', err));
      });
    }

    // ===== 2. Глобальные переменные =====
    const urlParams = new URLSearchParams(window.location.search);
    const projectId = urlParams.get('project');
    const loader = document.getElementById('loader');
    const loadText = document.getElementById('loadText');
    const tapOverlay = document.getElementById('tapOverlay');
    const startBtn = document.getElementById('startBtn');
    const hud = document.getElementById('hud');
    const hudText = document.getElementById('hudText');

    let projectData = null;
    let isStarted = false;

    // ===== 3. Инициализация =====
    async function init() {
      if (!projectId) {
        loader.innerHTML = `<div class="error-box"><h2>⚠️ Не указан проект</h2><p>Откройте ссылку вида:<br><code>?project=имя_файла</code></p></div>`;
        return;
      }

      loadText.textContent = 'Загрузка проекта...';
      try {
        const res = await fetch(`data/${projectId}.json`);
        if (!res.ok) throw new Error('Файл проекта не найден');
        projectData = await res.json();

        // Настройка сцены
        const scene = document.getElementById('scene');
        scene.setAttribute('mindar-image', `imageTargetSrc: ${projectData.trigger}; filterMinCF: 0.0001; filterBeta: 0.001; maxTrack: ${projectData.smooth || 9};`);        
        const video = document.getElementById('arVideo');
        video.src = projectData.content;
        video.setAttribute('scale', `${projectData.scale || 1} ${projectData.scale || 1} 1`);

        if (projectData.audioEnabled && projectData.audio) {
          document.getElementById('arAudio').src = projectData.audio;
          document.getElementById('arAudio').volume = projectData.audioVolume || 0.7;
        }

        // Показываем оверлей для iOS/Android (требует жест пользователя)
        loader.classList.add('hidden');
        tapOverlay.classList.remove('hidden');

      } catch (err) {
        loader.innerHTML = `<div class="error-box"><h2>❌ Ошибка загрузки</h2><p>${err.message}</p></div>`;
        console.error(err);
      }
    }

    // ===== 4. Запуск после касания (обход политик автоплея) =====
    startBtn.addEventListener('click', async () => {
      if (isStarted) return;
      isStarted = true;
      tapOverlay.classList.add('hidden');

      const scene = document.getElementById('scene');
      scene.removeAttribute('hidden');
      hud.style.display = 'flex';
      hudText.textContent = '📸 Сканирование...';

      await new Promise(r => setTimeout(r, 600)); // Пауза для инициализации WebGL
      scene.play();

      // Слушатели распознавания
      const target = document.getElementById('target');
      target.addEventListener('targetFound', () => {
        hudText.textContent = '✨ Триггер найден!';
        hud.style.background = 'rgba(0,212,170,0.8)';
        document.getElementById('arVideo').play().catch(()=>{});
        if (projectData?.audioEnabled) document.getElementById('arAudio').play().catch(()=>{});
      });

      target.addEventListener('targetLost', () => {
        hudText.textContent = '👁 Наведите камеру снова';
        hud.style.background = 'rgba(255,165,0,0.8)';
        document.getElementById('arVideo').pause();
        if (projectData?.audioEnabled) document.getElementById('arAudio').pause();
      });
    });
    // Запуск
    init();
  </script>
</body>
</html>

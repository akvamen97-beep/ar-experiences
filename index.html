<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>AR Player</title>
    <style>
        body { margin: 0; background: #000; color: #fff; font-family: -apple-system, sans-serif; overflow: hidden; }
        #loader { position: fixed; inset: 0; background: #0a0a12; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 999; transition: opacity 0.3s; }
        .spinner { width: 50px; height: 50px; border: 5px solid #222; border-top: 5px solid #6c5ce7; border-radius: 50%; animation: spin 0.8s linear infinite; margin-bottom: 20px; }
        @keyframes spin { 100% { transform: rotate(360deg); } }
        #status { font-size: 16px; color: #888; text-align: center; padding: 0 20px; }
        #startBtn { display: none; padding: 16px 40px; background: #6c5ce7; color: #fff; border: none; border-radius: 30px; font-size: 18px; font-weight: 600; cursor: pointer; margin-top: 20px; }
        a-scene { width: 100%; height: 100vh; }
        .hud { position: fixed; bottom: 40px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.7); padding: 12px 24px; border-radius: 25px; font-size: 15px; z-index: 100; display: none; backdrop-filter: blur(8px); }
        .error { color: #ff6b6b; margin-top: 15px; font-size: 14px; max-width: 80%; text-align: center; }
    </style>
    
    <script>
        // Надёжная загрузка через GitHub-зеркала (обходит блокировки провайдеров)
        async function loadScript(url) {
            return new Promise((resolve, reject) => {
                const s = document.createElement('script');
                s.src = url;
                s.onload = resolve;
                s.onerror = () => reject(url);
                document.head.appendChild(s);
            });
        }

        async function init() {
            const status = document.getElementById('status');
            try {
                status.innerText = "Загрузка движка (1/2)...";
                // Пробуем GitHub-зеркало cdnjs
                await loadScript('https://cdnjs.cloudflare.com/ajax/libs/aframe/1.5.0/aframe.min.js');
                
                status.innerText = "Загрузка AR модуля (2/2)...";
                await loadScript('https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js');
                
                // Если дошли сюда - всё ок
                document.getElementById('loader').innerHTML = '<button id="startBtn" onclick="startAR()">👆 Нажми, чтобы начать</button>';
                document.getElementById('startBtn').style.display = 'block';
            } catch (err) {
                document.getElementById('status').innerHTML = `<span class="error">⛔ Сеть блокирует загрузку скриптов.<br>Попробуйте открыть в Chrome/Safari или отключите VPN/AdBlock.<br><br>Ошибка: ${err}</span>`;
            }
        }

        function startAR() {
            document.getElementById('loader').style.opacity = '0';
            setTimeout(() => document.getElementById('loader').style.display = 'none', 300);
            
            const urlParams = new URLSearchParams(window.location.search);
            const projectId = urlParams.get('project');
            if (!projectId) {
                alert('Ошибка: добавь ?project=имя_файла в конец ссылки');
                return;
            }

            fetch(`data/${projectId}.json`)
                .then(r => { if(!r.ok) throw new Error('Файл проекта не найден'); return r.json(); })
                .then(d => {
                    const scene = document.createElement('a-scene');
                    scene.setAttribute('mindar-image', `imageTargetSrc: ${d.trigger}; filterMinCF: 0.0001; filterBeta: 0.001; maxTrack: ${d.smooth||9};`);
                    scene.setAttribute('vr-mode-ui', 'enabled: false');
                    scene.setAttribute('loading-screen', 'enabled: false');
                    document.body.appendChild(scene);
                    
                    const assets = document.createElement('a-assets');
                    const vid = document.createElement('video');
                    vid.id = 'arVid'; vid.src = d.content; vid.setAttribute('loop',''); vid.setAttribute('playsinline',''); vid.setAttribute('crossorigin','');
                    assets.appendChild(vid); scene.appendChild(assets);
                    
                    const cam = document.createElement('a-camera'); cam.setAttribute('position','0 0 0'); scene.appendChild(cam);
                    
                    const target = document.createElement('a-entity');
                    target.setAttribute('mindar-image-target','targetIndex: 0');
                    const plane = document.createElement('a-video');
                    plane.setAttribute('src','#arVid'); plane.setAttribute('position','0 0 0.01');
                    plane.setAttribute('scale',`${d.scale||1} ${d.scale||1} 1`);
                    target.appendChild(plane); scene.appendChild(target);
                    
                    const hud = document.createElement('div'); hud.className='hud'; hud.innerText='Сканирование...'; document.body.appendChild(hud); hud.style.display='block';
                    
                    target.addEventListener('targetFound', () => { hud.innerText='✨ Найдено!'; hud.style.background='rgba(0,200,100,0.8)'; vid.play(); });
                    target.addEventListener('targetLost', () => { hud.innerText='👁 Наведите снова'; hud.style.background='rgba(200,100,0,0.8)'; vid.pause(); });
                })
                .catch(e => alert('Ошибка данных: '+e));
        }
        window.onload = init;
    </script>
</head>
<body>
    <div id="loader">
        <div class="spinner"></div>
        <div id="status">Инициализация...</div>
    </div>
</body>
</html>

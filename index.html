<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>AR Player</title>
    <style>
        body { margin: 0; background: #000; color: #fff; font-family: sans-serif; overflow: hidden; }
        #loader { position: fixed; inset: 0; background: #0a0a12; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 999; }
        .spinner { width: 50px; height: 50px; border: 5px solid #333; border-top: 5px solid #6c5ce7; border-radius: 50%; animation: spin 1s linear infinite; margin-bottom: 20px; }
        @keyframes spin { 100% { transform: rotate(360deg); } }
        #status { font-size: 18px; color: #aaa; }
        #startBtn { display: none; padding: 15px 40px; background: #6c5ce7; color: #fff; border: none; border-radius: 30px; font-size: 20px; font-weight: bold; cursor: pointer; margin-top: 20px; }
        a-scene { width: 100%; height: 100vh; }
        .hud { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.6); padding: 10px 20px; border-radius: 20px; font-size: 14px; z-index: 100; display: none; }
    </style>
    
    <script>
        // Умная загрузка библиотек (пробует разные источники)
        async function loadScript(url) {
            return new Promise((resolve, reject) => {
                const script = document.createElement('script');
                script.src = url;
                script.onload = resolve;
                script.onerror = reject;
                document.head.appendChild(script);
            });
        }

        async function initSystem() {
            const status = document.getElementById('status');
            try {
                // 1. Загружаем A-Frame
                status.innerText = "Загрузка движка...";
                try { await loadScript('https://aframe.io/releases/1.5.0/aframe.min.js'); }
                catch(e) { await loadScript('https://unpkg.com/aframe@1.5.0/dist/aframe.min.js'); }
                
                // 2. Загружаем MindAR
                status.innerText = "Загрузка AR модуля...";
                try { await loadScript('https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js'); }
                catch(e) { await loadScript('https://unpkg.com/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js'); }
                
                // Если всё ок, показываем кнопку
                status.innerText = "Готово!";
                document.getElementById('loader').innerHTML = '<button id="startBtn" onclick="startAR()">👆 Нажми, чтобы начать</button>';
                document.getElementById('startBtn').style.display = 'block';
                
            } catch (err) {
                status.innerText = "Ошибка сети. Проверь интернет.";
                status.style.color = "red";            }
        }

        function startAR() {
            document.getElementById('loader').style.display = 'none';
            
            // Получаем ID проекта из ссылки
            const urlParams = new URLSearchParams(window.location.search);
            const projectId = urlParams.get('project');
            
            if (!projectId) {
                alert('Ошибка: Не указан проект! Ссылка должна быть вида: ?project=ivan-vizitka');
                return;
            }

            // Загружаем данные проекта
            fetch(`data/${projectId}.json`)
                .then(res => {
                    if (!res.ok) throw new Error('Проект не найден');
                    return res.json();
                })
                .then(data => {
                    // Создаем сцену
                    const scene = document.createElement('a-scene');
                    scene.setAttribute('mindar-image', `imageTargetSrc: ${data.trigger}; filterMinCF: 0.0001; filterBeta: 0.001; maxTrack: ${data.smooth || 9};`);
                    scene.setAttribute('vr-mode-ui', 'enabled: false');
                    scene.setAttribute('loading-screen', 'enabled: false');
                    document.body.appendChild(scene);
                    
                    // Активы (видео)
                    const assets = document.createElement('a-assets');
                    const video = document.createElement('video');
                    video.id = 'arVideo';
                    video.src = data.content;
                    video.setAttribute('loop', '');
                    video.setAttribute('playsinline', '');
                    video.setAttribute('crossorigin', '');
                    video.setAttribute('preload', 'auto');
                    assets.appendChild(video);
                    scene.appendChild(assets);
                    
                    // Камера
                    const camera = document.createElement('a-camera');
                    camera.setAttribute('position', '0 0 0');
                    scene.appendChild(camera);
                    
                    // Цель (Target)
                    const target = document.createElement('a-entity');
                    target.setAttribute('mindar-image-target', 'targetIndex: 0');
                                        // Видео плоскость
                    const videoPlane = document.createElement('a-video');
                    videoPlane.setAttribute('src', '#arVideo');
                    videoPlane.setAttribute('position', '0 0 0.01');
                    videoPlane.setAttribute('scale', `${data.scale || 1} ${data.scale || 1} 1`);
                    target.appendChild(videoPlane);
                    
                    scene.appendChild(target);
                    
                    // HUD
                    const hud = document.createElement('div');
                    hud.className = 'hud';
                    hud.innerText = 'Сканирование...';
                    document.body.appendChild(hud);
                    hud.style.display = 'block';

                    target.addEventListener('targetFound', () => {
                        hud.innerText = '✨ Триггер найден!';
                        hud.style.background = 'rgba(0, 200, 100, 0.8)';
                        video.play();
                    });
                    
                    target.addEventListener('targetLost', () => {
                        hud.innerText = '👁 Наведите снова';
                        hud.style.background = 'rgba(200, 100, 0, 0.8)';
                        video.pause();
                    });
                })
                .catch(err => alert('Ошибка: ' + err));
        }

        window.onload = initSystem;
    </script>
</head>
<body>
    <div id="loader">
        <div class="spinner"></div>
        <div id="status">Инициализация...</div>
    </div>
</body>
</html>
